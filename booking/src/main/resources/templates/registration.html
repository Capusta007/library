<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card">
                <div class="card-body">
                    <h2 class="card-title text-center mb-4">Регистрация</h2>
                    <div class="alert alert-danger" th:if="${param.error}">
                        Юзер с таким именем уже существует
                    </div>
                    <form method="post" th:action="@{/registration}" th:object="${user}">
                        <div class="mb-3">
                            <label class="form-label" for="name">Имя</label>
                            <input class="form-control" id="name" required th:field="*{username}" type="text">
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="password">Пароль</label>
                            <input class="form-control" id="password" required th:field="*{password}" type="password">
                        </div>
                        <button class="btn btn-primary w-100" type="submit">Зарегистрироваться</button>
                    </form>
                    <div class="text-center mt-3">
                        <p>Уже есть аккаунт? <a th:href="@{/login}">Войти</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap 5 JS Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html></title>
</head>
<body>

</body>
</html>
