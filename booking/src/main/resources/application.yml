server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/library
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

